name: Build Unsigned IPA (AltStore)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available SDKs
        run: xcodebuild -showsdks 2>&1 | grep iphoneos

      - name: Fix Assets.xcassets
        run: |
          ASSETS="DogePowerControl/Assets.xcassets"
          rm -rf "$ASSETS/AppIcon.appiconset"
          mkdir -p "$ASSETS/AppIcon.appiconset"
          cat > "$ASSETS/AppIcon.appiconset/Contents.json" << 'EOF'
          {
            "images": [],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF
          cat > "$ASSETS/img_doge.imageset/Contents.json" << 'EOF'
          {
            "images": [{ "filename": "img_doge.png", "idiom": "universal" }],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF
          cat > "$ASSETS/img_on.imageset/Contents.json" << 'EOF'
          {
            "images": [{ "filename": "img_on.png", "idiom": "universal" }],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF
          cat > "$ASSETS/img_off.imageset/Contents.json" << 'EOF'
          {
            "images": [{ "filename": "img_off.png", "idiom": "universal" }],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project DogePowerControl.xcodeproj \
            -scheme DogePowerControl 2>&1 | tail -5

      - name: List schemes
        run: xcodebuild -list -project DogePowerControl.xcodeproj

      - name: Build for iOS (unsigned)
        run: |
          SDK=$(xcodebuild -showsdks 2>&1 | grep iphoneos | grep -v simulator | tail -1 | awk '{print $NF}')
          echo "Using SDK: $SDK"
          set -o pipefail
          xcodebuild clean build \
            -project DogePowerControl.xcodeproj \
            -scheme DogePowerControl \
            -configuration Release \
            -sdk "$SDK" \
            -derivedDataPath build \
            ARCHS="arm64" \
            VALID_ARCHS="arm64" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          if [ "$EXIT_CODE" -ne 0 ]; then
            tail -n 100 build.log
            exit 1
          fi

      - name: Locate built .app
        id: locate
        run: |
          APP_PATH=$(find build -iname "DogePowerControl.app" -type d | head -n 1)
          echo "App found at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then exit 1; fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Ad-hoc self-sign app bundle
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          codesign --force --deep --sign - "$APP_PATH"

      - name: Package as IPA
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload DogePowerControl-unsigned.ipa
          ls -la DogePowerControl-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogePowerControl-unsigned-ipa
          path: DogePowerControl-unsigned.ipa
          retention-days: 14
