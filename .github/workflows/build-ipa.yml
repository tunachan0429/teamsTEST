name: Build Unsigned IPA (AltStore)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode_16.app/Contents/Developer || true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project DogePowerControl.xcodeproj \
            -scheme DogePowerControl

      - name: Build for iOS (unsigned, generic device)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project DogePowerControl.xcodeproj \
            -scheme DogePowerControl \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true

      - name: Locate built .app
        id: locate
        run: |
          APP_PATH=$(find build -name "DogePowerControl.app" -path "*Release-iphoneos*" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "DogePowerControl.app" | head -n 1)
          fi
          echo "App found at: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify Info.plist required keys
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          PLIST="$APP_PATH/Info.plist"
          echo "--- Info.plist contents ---"
          plutil -p "$PLIST"
          if ! /usr/libexec/PlistBuddy -c "Print :MinimumOSVersion" "$PLIST" 2>/dev/null; then
            echo "MinimumOSVersion missing, adding default 17.0"
            /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string 17.0" "$PLIST"
          fi

      - name: Ad-hoc self-sign app bundle
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          echo "Signing $APP_PATH with ad-hoc identity"
          find "$APP_PATH/Frameworks" -name "*.framework" -o -name "*.dylib" 2>/dev/null | while read -r fw; do
            codesign --force --deep --sign - "$fw" || true
          done
          codesign --force --deep --sign - "$APP_PATH"
          echo "--- Verifying signature ---"
          codesign -dv "$APP_PATH" || true

      - name: Package as ad-hoc signed IPA
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          echo "Packaging app at: $APP_PATH"
          rm -rf Payload DogePowerControl-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          xattr -cr Payload/DogePowerControl.app
          find Payload -name ".DS_Store" -delete
          if [ ! -f "Payload/DogePowerControl.app/Info.plist" ]; then
            echo "ERROR: Info.plist missing from app bundle!"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent Payload DogePowerControl-unsigned.ipa
          echo "--- IPA contents ---"
          unzip -l DogePowerControl-unsigned.ipa
          ls -la DogePowerControl-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogePowerControl-unsigned-ipa
          path: DogePowerControl-unsigned.ipa
          retention-days: 14
