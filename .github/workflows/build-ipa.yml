name: Build Unsigned IPA (AltStore)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -switch /Applications/Xcode_16.app/Contents/Developer || true

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project DogePowerControl.xcodeproj \
            -scheme DogePowerControl

      - name: Build for iOS (unsigned, generic device)
        run: |
          set -o pipefail
          xcodebuild clean build \
            -project DogePowerControl.xcodeproj \
            -scheme DogePowerControl \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true

      - name: Locate built .app
        id: locate
        run: |
          APP_PATH=$(find build -name "DogePowerControl.app" -path "*Release-iphoneos*" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "DogePowerControl.app" | head -n 1)
          fi
          echo "App found at: $APP_PATH"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Package as unsigned IPA
        run: |
          APP_PATH="${{ steps.locate.outputs.app_path }}"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r DogePowerControl-unsigned.ipa Payload
          ls -la DogePowerControl-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: DogePowerControl-unsigned-ipa
          path: DogePowerControl-unsigned.ipa
          retention-days: 14
